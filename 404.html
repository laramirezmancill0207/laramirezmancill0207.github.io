<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PortfolioSite</title>
    <base href="/" />
    <link href="/css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/app.css" rel="stylesheet" />
    <link rel="icon" type="/image/png" href="/favicon.png" />
    <link href="/Portfolio.styles.css" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Custom Loading Screen -->
        <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background:rgba(45, 45, 45, 1);">
            <h2 style="color:#1db954; font-family:sans-serif; margin-bottom: 20px;">Loading Portfolio...</h2>
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/js/animation.js"></script>
    <script src="/_framework/blazor.webassembly.js"></script>
</body>

</html>
